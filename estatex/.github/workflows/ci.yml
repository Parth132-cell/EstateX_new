name: EstateX CI

on:
  push:
    branches: ["*"]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: estatex/backend
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: estatex
          POSTGRES_USER: estatex
          POSTGRES_PASSWORD: estatex
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U estatex"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run migrations
        env:
          DEBUG: "True"
          SECRET_KEY: ci-secret
          POSTGRES_DB: estatex
          POSTGRES_USER: estatex
          POSTGRES_PASSWORD: estatex
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          REDIS_URL: redis://localhost:6379/0
        run: python manage.py migrate
      - name: Run tests
        env:
          DEBUG: "True"
          SECRET_KEY: ci-secret
          POSTGRES_DB: estatex
          POSTGRES_USER: estatex
          POSTGRES_PASSWORD: estatex
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          REDIS_URL: redis://localhost:6379/0
        run: pytest
