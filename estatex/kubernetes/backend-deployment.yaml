apiVersion: apps/v1
kind: Deployment
metadata:
  name: estatex-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: estatex-backend
  template:
    metadata:
      labels:
        app: estatex-backend
    spec:
      containers:
        - name: backend
          image: estatex/backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: POSTGRES_HOST
              value: postgres.default.svc.cluster.local
            - name: REDIS_URL
              value: redis://redis.default.svc.cluster.local:6379/0
---
apiVersion: v1
kind: Service
metadata:
  name: estatex-backend
spec:
  selector:
    app: estatex-backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
