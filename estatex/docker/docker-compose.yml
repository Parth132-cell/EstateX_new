version: "3.9"
services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    env_file:
      - ../backend/.env.example
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: estatex
      POSTGRES_USER: estatex
      POSTGRES_PASSWORD: estatex
    ports:
      - "5432:5432"
  redis:
    image: redis:7
    ports:
      - "6379:6379"
